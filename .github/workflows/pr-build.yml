name: pr - build and test

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: pr - build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Test results
        if: always()
        run: echo "✓ Build successful"
