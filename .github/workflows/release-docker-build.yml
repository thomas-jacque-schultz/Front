name: Release - Build and Push Docker Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "VERSION=${VERSION}"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/bot-front:${{ steps.version.outputs.version }}
            ${{ secrets.DOCKER_USERNAME }}/bot-front:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/bot-front:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/bot-front:buildcache,mode=max

      - name: Image pushed successfully
        run: |
          echo "✓ Docker image pushed: ${{ secrets.DOCKER_USERNAME }}/bot-front:${{ steps.version.outputs.version }}"
          echo "✓ Docker image pushed: ${{ secrets.DOCKER_USERNAME }}/bot-front:latest"
